<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftPass Elite | Validation Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        :root {
            --accent-indigo: #6366f1;
            --accent-blue: #3b82f6;
            --bg-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
        }

        .light-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            animation: float 25s infinite alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.08);
            top: -200px;
            right: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.08);
            bottom: -100px;
            left: -100px;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(-30px, 50px);
            }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.03);
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
        }

        #reader {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        #reader video {
            border-radius: 2rem;
        }

        .input-premium {
            background: rgba(255, 255, 255, 1);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .dark body {
            background-color: #0f172a;
            color: #f1f5f9;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(249, 115, 22, 0.1) 0%, transparent 40%);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .dark .input-premium {
            background: rgba(30, 41, 59, 1);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f8fafc;
        }

        .dark .text-slate-900 {
            color: #f8fafc;
        }

        .dark .text-slate-700 {
            color: #e2e8f0;
        }

        .dark .bg-white {
            background-color: #1e293b;
        }

        .dark .bg-slate-50 {
            background-color: #0f172a;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .dark .border-slate-50,
        .dark .border-slate-100 {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .dark .border-slate-200 {
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="light-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="container mx-auto mb-12 flex justify-between items-center glass p-5 rounded-[2.5rem]">
        <div class="flex items-center gap-4">
            <div
                class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <span class="text-2xl">🛡️</span>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 leading-none">SwiftPass<span
                        class="text-indigo-500 italic">Verify</span></h1>
                <p class="text-[10px] uppercase tracking-[0.4em] text-slate-400 font-bold mt-1">Conductor Console</p>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <button id="themeToggle"
                class="w-10 h-10 rounded-full glass hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center">
                <span id="themeIcon">🌙</span>
            </button>
            <div id="liveClock"
                class="hidden lg:block text-xs font-black text-slate-700 bg-slate-50 px-4 py-2 rounded-full border border-slate-100 tracking-widest shadow-sm">
            </div>
            <a href="buspass_issuance.html"
                class="bg-orange-500/10 text-orange-600 px-6 py-2.5 rounded-full text-xs font-black border border-orange-500/20 hover:bg-orange-500/20 transition-all uppercase tracking-widest">
                Issue Pass
            </a>
        </div>
    </nav>

    <main class="container mx-auto grid lg:grid-cols-12 gap-10">
        <!-- SCANNER SECTION -->
        <section class="lg:col-span-12 xl:col-span-4 space-y-8">
            <div class="glass p-8 rounded-[3rem] border border-slate-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 blur-3xl"></div>

                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">SCANNER</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Terminal Active
                        </p>
                    </div>
                    <div class="flex flex-wrap gap-2 justify-end">
                        <button id="startScanner"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
                            Camera
                        </button>
                        <button id="stopScanner"
                            class="hidden bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-rose-500/20 active:scale-95">
                            Stop
                        </button>
                        <label for="qrUpload"
                            class="cursor-pointer bg-slate-100 dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 hover:bg-slate-200 dark:hover:bg-slate-700 px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all flex items-center justify-center active:scale-95 border border-transparent dark:border-slate-700">
                            Upload Pic
                        </label>
                        <input type="file" id="qrUpload" accept="image/*" class="hidden" />
                    </div>
                </div>

                <div class="rounded-[2.5rem] bg-white dark:bg-slate-800 overflow-hidden border border-slate-100 dark:border-slate-700 aspect-square relative">
                    <div id="reader" class="w-full h-full absolute inset-0 flex items-center justify-center"></div>
                    <div id="scannerPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-center space-y-4 opacity-50 bg-white dark:bg-slate-800 z-10 transition-opacity duration-300">
                        <div class="w-16 h-16 border-2 border-dashed border-slate-200 dark:border-slate-600 rounded-2xl mx-auto flex items-center justify-center">
                            <svg class="w-6 h-6 text-slate-300 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            </svg>
                        </div>
                        <p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Awaiting Lens</p>
                    </div>
                </div>

                <div id="scanResult"
                    class="mt-8 p-6 rounded-[2rem] hidden transform animate-in slide-in-from-bottom-5 duration-500 shadow-sm border border-slate-50">
                </div>

                <div class="mt-10">
                    <h3
                        class="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] mb-6 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span> Recent Scans
                    </h3>
                    <div id="scanList" class="space-y-3">
                        <div class="text-center py-6 opacity-40">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Registry Silent
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- REGISTRY SECTION -->
        <section class="lg:col-span-12 xl:col-span-8 space-y-8">
            <div class="glass p-10 rounded-[3.5rem] h-full relative overflow-hidden">
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500/5 blur-[120px]"></div>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                    <div>
                        <h2 class="text-3xl font-black text-slate-900 tracking-tighter">PASSENGERS</h2>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-[0.3em] mt-1">Live Identity
                            Registry</p>
                    </div>
                    <div class="w-full md:w-80 relative">
                        <input type="text" id="searchInput" placeholder="Search passholders..."
                            class="input-premium w-full p-4 pl-12 rounded-2xl outline-none text-slate-900 placeholder:text-slate-300 font-bold text-sm" />
                        <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>

                <div id="registryList" class="grid sm:grid-cols-2 lg:grid-cols-2 2xl:grid-cols-3 gap-6">
                    <!-- Cards injected here -->
                </div>
            </div>
        </section>
    </main>

    <script>
        const registryList = document.getElementById("registryList");
        const scanResult = document.getElementById("scanResult");
        const scanList = document.getElementById("scanList");
        const searchInput = document.getElementById("searchInput");
        const liveClock = document.getElementById("liveClock");

        // Theme toggle logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                themeIcon.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.textContent = '🌙';
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme(true);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = !document.documentElement.classList.contains('dark');
            setTheme(isDark);
        });

        setInterval(() => {
            const now = new Date();
            liveClock.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }, 1000);

        function loadRegistry(query = '') {
            const registryData = JSON.parse(localStorage.getItem('swiftpass_registry') || '[]');
            renderRegistry(registryData, query);
        }

        function renderRegistry(data, query = '') {
            registryList.innerHTML = '';

            const filteredData = data.filter(user =>
                user.n.toLowerCase().includes(query.toLowerCase()) ||
                user.t.toLowerCase().includes(query.toLowerCase())
            );

            if (filteredData.length === 0) {
                registryList.innerHTML = `<div class="col-span-full text-center py-20 opacity-40"><p class="text-xs font-black uppercase tracking-[0.4em] text-slate-400">Database Empty</p></div>`;
                return;
            }

            filteredData.forEach(user => {
                const card = document.createElement('div');
                card.className = 'glass-card p-6 rounded-[2.5rem] group';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center group-hover:bg-indigo-50 transition-colors shadow-inner">
                            <span class="text-xl">👤</span>
                        </div>
                        <span class="text-[9px] font-black px-3 py-1 bg-indigo-50 text-indigo-500 border border-indigo-100 rounded-full uppercase tracking-widest">${user.t} TIER</span>
                    </div>
                    <div>
                        <h4 class="text-slate-900 font-black text-lg uppercase tracking-tight truncate">${user.n}</h4>
                        <div class="mt-4 space-y-1">
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-slate-400 uppercase tracking-tighter">Asset ID</span>
                                <span class="text-slate-600 font-mono">${user.id || 'N/A'}</span>
                            </div>
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-slate-400 uppercase tracking-tighter">Expiry</span>
                                <span class="text-indigo-600">${user.e}</span>
                            </div>
                        </div>
                    </div>
                `;
                registryList.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => loadRegistry(e.target.value));

        const html5QrCode = new Html5Qrcode("reader");
        let isScanning = false;

        function stopScanning() {
            if (isScanning) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    html5QrCode.clear();
                    document.getElementById("scannerPlaceholder").classList.remove("hidden");
                    document.getElementById("startScanner").classList.remove("hidden");
                    document.getElementById("stopScanner").classList.add("hidden");
                }).catch(err => console.error(err));
            }
        }

        document.getElementById("startScanner").addEventListener("click", () => {
            if (isScanning) return;
            document.getElementById("scannerPlaceholder").classList.add("hidden");
            
            const config = { fps: 15, qrbox: { width: 280, height: 280 } };
            const onSuccess = (decodedText) => {
                validatePassData(decodedText);
                stopScanning();
            };

            // Attempt to start environment-facing camera first
            html5QrCode.start({ facingMode: "environment" }, config, onSuccess, () => { })
                .then(() => {
                    isScanning = true;
                    document.getElementById("startScanner").classList.add("hidden");
                    document.getElementById("stopScanner").classList.remove("hidden");
                })
                .catch(err => {
                    // Fallback to user-facing camera if environment fails
                    html5QrCode.start({ facingMode: "user" }, config, onSuccess, () => { })
                        .then(() => {
                            isScanning = true;
                            document.getElementById("startScanner").classList.add("hidden");
                            document.getElementById("stopScanner").classList.remove("hidden");
                        })
                        .catch(err2 => {
                            document.getElementById("scannerPlaceholder").classList.remove("hidden");
                            alert("Camera access denied or unavailable. Please upload a picture of the QR code instead.");
                        });
                });
        });

        document.getElementById("stopScanner").addEventListener("click", stopScanning);

        document.getElementById("qrUpload").addEventListener("change", (e) => {
            if (e.target.files.length == 0) return;
            const imageFile = e.target.files[0];
            
            html5QrCode.scanFile(imageFile, true)
                .then(decodedText => {
                    validatePassData(decodedText);
                })
                .catch(err => {
                    alert("Could not detect any valid QR code in the uploaded image.");
                });
            e.target.value = ''; // allow uploading the same file again if needed
        });

        function validatePassData(jsonString) {
            try {
                const data = JSON.parse(jsonString);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expDate = new Date(data.e);
                const isValid = expDate >= today;

                scanResult.classList.remove("hidden");

                if (isValid) {
                    scanResult.className = "mt-8 p-8 rounded-[2.5rem] bg-emerald-50 text-emerald-600 border border-emerald-100 text-center animate-in zoom-in shadow-sm";
                    scanResult.innerHTML = `
                        <div class="text-xs font-black uppercase tracking-[0.5em] mb-4 opacity-70">Authenticated</div>
                        <div class="text-3xl font-black mb-2 uppercase tracking-tighter">ACCESS GRANTED</div>
                        <div class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">${data.n} • ${data.t}</div>
                    `;
                    if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
                } else {
                    scanResult.className = "mt-8 p-8 rounded-[2.5rem] bg-rose-50 text-rose-600 border border-rose-100 text-center animate-in zoom-in shadow-sm";
                    scanResult.innerHTML = `
                        <div class="text-xs font-black uppercase tracking-[0.5em] mb-4 opacity-70">Denied</div>
                        <div class="text-3xl font-black mb-2 uppercase tracking-tighter">PASS EXPIRED</div>
                        <div class="text-[10px] font-bold text-rose-400 uppercase tracking-widest">${data.n} Tier Status: Void</div>
                    `;
                    if (navigator.vibrate) navigator.vibrate(400);
                }

                addToHistory(data, isValid);
                loadRegistry();
            } catch (e) {
                scanResult.className = "mt-8 p-8 rounded-[2.5rem] bg-amber-50 text-amber-600 border border-amber-100 text-center";
                scanResult.innerHTML = `<div class="text-2xl font-black">UNKNOWN ASSET</div>`;
                scanResult.classList.remove("hidden");
            }
        }

        function addToHistory(data, isValid) {
            if (scanList.querySelector('p')) scanList.innerHTML = '';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const item = document.createElement("div");
            item.className = `glass rounded-2xl p-4 flex items-center justify-between border-l-4 ${isValid ? 'border-emerald-500' : 'border-rose-500'} shadow-sm`;
            item.innerHTML = `
                <div>
                    <p class="text-xs font-black text-slate-900 uppercase">${data.n || 'Unknown'}</p>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${data.t || 'Guest'}</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black text-slate-700">${time}</p>
                    <p class="text-[8px] font-black ${isValid ? 'text-emerald-500' : 'text-rose-500'} uppercase tracking-[0.2em]">${isValid ? 'VERIFIED' : 'FAILED'}</p>
                </div>
            `;
            scanList.prepend(item);
            if (scanList.children.length > 4) scanList.lastElementChild.remove();
        }

        loadRegistry();
    </script>
</body>

</html>
